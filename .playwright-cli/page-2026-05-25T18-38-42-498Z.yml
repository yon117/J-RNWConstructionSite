              - heading "Siding Installation" [level=2] [ref=e86]
              - paragraph [ref=e87]: "We install and replace siding across all major material types vinyl, fiber cement, and wood with the precision and attention to detail that makes the difference between a job that looks good on day one and one that still looks great a decade later. Every installation starts with a full inspection of what's underneath: the sheathing, the moisture barrier, and the condition of the framing. We don't cover up existing problems with new siding. We fix them first. Beyond protection, new siding is one of the highest-return upgrades you can make to a home. It transforms curb appeal instantly, improves energy efficiency when paired with proper insulation, and adds measurable resale value. If you're planning to sell, it's one of the first things buyers and inspectors notice. If you're staying, it's the kind of upgrade that pays for itself in comfort, lower energy bills, and pride in how your home looks. Free inspections, honest assessments, and no pressure to proceed. We serve the full Portland metro Portland, Tigard, Tualatin, Gresham, Happy Valley, Oregon City, Milwaukie, Hillsboro, and Beaverton."
